# Gate de CI — los guardarraíles del DS en verde o el cambio no entra.
# Dos streams (pre-flight §7): tokens/Figma (gen+parity+guard+type-parity) y
# preset/PrimeNG (auditor de escala), más lint/typecheck/build/e2e smoke.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    # El PR de `design-tokens-sync` lo verifica el workflow `tokens-sync` (regenera
    # primitivos antes de verificar); aquí lo saltamos para no dar un rojo de drift
    # espurio. En el merge a main, este `verify` corre igual (push → main).
    if: github.event_name != 'pull_request' || github.head_ref != 'design-tokens-sync'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Guardarraíles de tokens (stream Figma)
        run: |
          npm run tokens:gen
          npm run tokens:parity
          npm run tokens:guard
          npm run tokens:type-parity
      - name: Auditor de escala (stream preset)
        run: npm run audit:theme-scale
      - name: Build de los 3 paquetes
        run: npm run build
      - name: Lint + typecheck
        run: |
          npm run lint
          npm run typecheck
      - name: Build demo
        run: npm run build:demo
      - name: e2e smoke
        run: |
          npx playwright install --with-deps chromium
          npm run e2e
