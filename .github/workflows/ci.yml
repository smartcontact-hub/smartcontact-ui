# Gate de CI — los guardarraíles del DS en verde o el cambio no entra.
# Corre EL MISMO `npm run verify` que el gate local y el workflow tokens-sync
# (tokens gen+parity+guard+type-parity, escala, unit, docs-guard, build, typecheck,
# lint), más los builds de las apps (sc-demo + supervisor) y e2e smoke. Una sola
# fuente de verdad del gate: si diverge, un fallo se esconde (p.ej. test:unit).
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    # El PR de `design-tokens-sync` lo verifica el workflow `tokens-sync` (regenera
    # primitivos antes de verificar); aquí lo saltamos para no dar un rojo de drift
    # espurio. En el merge a main, este `verify` corre igual (push → main).
    if: github.event_name != 'pull_request' || github.head_ref != 'design-tokens-sync'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Gate completo (tokens + escala + unit + docs + build + typecheck + lint)
        run: npm run verify
      - name: Build demo
        run: npm run build:demo
      - name: Build supervisor (la app real, consume el DS local)
        run: npx ng build supervisor --configuration production
      - name: Build agent (consume el DS local)
        run: npx ng build agent --configuration production
      - name: e2e smoke
        run: |
          npx playwright install --with-deps chromium
          npm run e2e
