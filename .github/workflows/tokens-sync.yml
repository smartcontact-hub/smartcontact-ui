# Loop diseñador → código (rediseño ROBUSTO). El plugin primeui-figma-plugin-v4
# (Theme Designer) empuja el export DTCG a la rama `design-tokens-sync`.
#
# Clave del rediseño: el robot NO trabaja sobre esa rama (que el plugin también escribe
# y que puede quedar vieja respecto a main). En su lugar:
#   1. parte de MAIN,
#   2. toma SOLO el `kit-export-dtcg.json` que empujó el plugin (ignora su .theme-designer/),
#   3. regenera primitivos + verifica + e2e,
#   4. resetea `design-tokens-sync` a "main + el cambio" (limpio) y abre/actualiza el PR.
#
# Así el PR es SIEMPRE `main + el cambio de tokens` (sin staleness, sin basura del plugin,
# sin carrera de push), y la rama se auto-cura en cada corrida.
#
# VERDE = cuadra con la escala → mergear. ROJO = drift en capas curadas (color/semántica) → dev.
name: tokens-sync

on:
  push:
    branches: [design-tokens-sync]
    paths:
      - projects/design-tokens/scripts/kit-export-dtcg.json

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: tokens-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Trae SOLO el export que empujó el plugin, aplicado encima de main (descarta su
      # .theme-designer/ y cualquier divergencia de la rama del plugin).
      - name: Tomar el export del plugin sobre main
        run: |
          git fetch origin design-tokens-sync
          git checkout origin/design-tokens-sync -- projects/design-tokens/scripts/kit-export-dtcg.json

      - name: Regenerar primitivos desde el export
        run: npm run tokens:import

      - name: Verify (parity + guard + escala + build + lint + typecheck)
        run: npm run verify

      - name: e2e smoke (regresión visual por cambio de token)
        run: |
          npx playwright install --with-deps chromium
          npm run e2e

      # Aunque verify/e2e fallen (drift en capas curadas), publicamos la rama limpia + PR
      # como banco de trabajo; el estado del run es la señal verde/rojo.
      - name: Resetear design-tokens-sync a main + el cambio, y abrir/actualizar PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Solo los ficheros de token (NO test-results/ de Playwright, NO .theme-designer/ del plugin).
          git add projects/design-tokens/
          if git diff --cached --quiet; then
            CHANGED=0
            echo "Export == main: la rama se resetea a main limpio (sin residuo del plugin ni de tests)."
          else
            CHANGED=1
            git commit -m "chore(tokens): export del Theme Designer + primitivos regenerados"
          fi
          # El workflow es el ÚNICO dueño de design-tokens-sync: SIEMPRE la reseteamos al estado
          # canónico (main, o main+cambio). Así nunca queda CSS viejo ni basura del plugin aunque
          # el cambio iguale a main (p.ej. un revert).
          #
          # OJO — NADA de [skip ci] en este commit (trampa cazada 2026-06-16):
          #   · El bucle YA está evitado: GitHub no re-dispara workflows por pushes de GITHUB_TOKEN.
          #   · Pero Cloudflare Pages TAMBIÉN obedece [skip ci] → se saltaría el build y el preview
          #     de la rama quedaría CONGELADO (prod mostraba el cambio, el preview de rama no).
          #   El preview de rama es justo lo que el diseñador mira → no se puede saltar su build.
          git push --force origin HEAD:design-tokens-sync

          if [ "$CHANGED" = 0 ]; then
            # Revert / no-op: no hay nada que revisar → cierra el PR si quedó abierto.
            gh pr close design-tokens-sync --comment "Revertido: el export coincide con main; no hay cambio que mergear." 2>/dev/null \
              && echo "PR cerrado (sin cambio)." || echo "Sin PR que cerrar."
          else
            body=$(printf 'Sync del Theme Designer: export DTCG nuevo aplicado SOBRE main + primitivos @sc-gen regenerados.\n\n- VERDE = cuadra con la escala, listo para mergear.\n- ROJO = drift en capas curadas (color/semantica) -> aplicar a 02-semantic / 03-palette / 04-component antes de mergear.')
            if gh pr view design-tokens-sync --json state --jq .state 2>/dev/null | grep -q OPEN; then
              echo "PR ya abierto — los commits nuevos lo actualizan."
            elif gh pr create --base main --head design-tokens-sync --title "chore(tokens): sync del Theme Designer" --body "$body"; then
              echo "PR abierto."
            else
              echo "::warning title=PR no abierto::Habilita Settings -> Actions -> General -> 'Allow GitHub Actions to create and approve pull requests'."
            fi
          fi
