<h1>sc-color-dot-picker</h1>

<p>
  Fila de puntos de color seleccionables — el picker categórico de 8 colores del
  DS (<code>LABEL_COLORS</code>, los mismos de la variante <em>label</em> de
  tag/chip). Two-way <code>[(value)]</code>.
</p>

<div class="row">
  <sc-color-dot-picker [options]="options" [(value)]="value" data-testid="sc-dotpicker" />
</div>

<p data-testid="dotpicker-value">seleccionado: {{ value() }}</p>
