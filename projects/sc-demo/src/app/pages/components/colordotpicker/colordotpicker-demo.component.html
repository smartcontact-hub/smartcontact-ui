<app-story-host [meta]="meta" [stories]="stories()" />

<ng-template #playground let-args>
  <sc-color-dot-picker
    [options]="options"
    [value]="args.value"
    [ariaLabel]="args.ariaLabel"
  />
</ng-template>

<ng-template #basic>
  <div class="col">
    <div class="row">
      <sc-color-dot-picker [options]="options" [(value)]="value" data-testid="sc-dotpicker" />
    </div>
    <p data-testid="dotpicker-value">seleccionado: {{ value() }}</p>
  </div>
</ng-template>
