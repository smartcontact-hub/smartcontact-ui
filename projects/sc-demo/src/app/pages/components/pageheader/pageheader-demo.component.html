<app-story-host [meta]="meta" [stories]="stories()" />

<!-- Stories declaradas como `<ng-template>`: el motor las pinta en su canvas. El
     Playground recibe `args` (knobs); los ejemplos son estáticos. La acción
     primaria se proyecta en [page-header-actions]. Los `data-testid` los miden
     los e2e de métrica del Kit (no quitar). -->

<ng-template #playground let-args>
  <sc-page-header
    [icon]="args.icon || null"
    [entityKey]="args.entityKey || null"
    [titleKey]="args.titleKey"
    [subtitleKey]="args.subtitleKey || null"
  >
    <button type="button" page-header-actions>Nuevo agente</button>
  </sc-page-header>
</ng-template>

<ng-template #full>
  <sc-page-header
    icon="groups"
    entityKey="CONFIGURACIÓN"
    titleKey="Agentes"
    subtitleKey="Gestiona los agentes de voz de tu organización."
    data-testid="sc-pageheader-full"
  >
    <button type="button" page-header-actions>Nuevo agente</button>
  </sc-page-header>
</ng-template>

<ng-template #minimal>
  <sc-page-header titleKey="Etiquetas" data-testid="sc-pageheader-min" />
</ng-template>
