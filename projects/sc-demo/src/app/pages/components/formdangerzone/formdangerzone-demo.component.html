<app-story-host [meta]="meta" [stories]="stories()" />

<!-- Stories declaradas como `<ng-template>`: el motor las pinta en su canvas. El
     Playground recibe `args` (knobs); los ejemplos son estáticos. Los `data-testid`
     los miden los e2e de métrica del Kit (no quitar). -->

<ng-template #playground let-args>
  <sc-form-danger-zone
    [titleKey]="args.titleKey"
    [descriptionKey]="args.descriptionKey"
    [actionKey]="args.actionKey"
    [disabled]="args.disabled"
  />
</ng-template>

<ng-template #basic>
  <sc-form-danger-zone
    titleKey="Zona de peligro"
    descriptionKey="Eliminar este agente es permanente. Se borrarán sus conversaciones y configuración."
    actionKey="Eliminar agente"
    (action)="onAction()"
    data-testid="sc-dangerzone"
  />

  @if (fired()) {
    <p data-testid="sc-dangerzone-fired">acción disparada</p>
  }
</ng-template>
