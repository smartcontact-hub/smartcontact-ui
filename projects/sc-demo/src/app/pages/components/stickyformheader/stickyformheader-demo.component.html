<app-story-host [meta]="meta" [stories]="stories()" />

<!-- Stories declaradas como `<ng-template>`: el motor las pinta en su canvas. El
     Playground recibe `args` (knobs); `name` es required → se bindea desde el
     signal del componente para que la edición inline funcione. Los `data-testid`
     los miden los e2e de métrica del Kit (no quitar). -->

<ng-template #playground let-args>
  <sc-sticky-form-header
    [mode]="args.mode"
    [entityKey]="args.entityKey"
    [name]="name()"
    [canSave]="args.canSave"
    [saving]="args.saving"
    [namePlaceholderKey]="args.namePlaceholderKey"
    [showBack]="args.showBack"
    (nameChange)="onNameChange($event)"
    (save)="onSave()"
  />
</ng-template>

<ng-template #edit>
  <sc-sticky-form-header
    mode="edit"
    entityKey="AGENTE"
    [name]="name()"
    (nameChange)="onNameChange($event)"
    (save)="onSave()"
    data-testid="sc-sticky-edit"
  />
</ng-template>

<ng-template #create>
  <sc-sticky-form-header
    mode="create"
    entityKey="Nuevo agente"
    [name]="''"
    namePlaceholderKey="Nombre del agente"
    data-testid="sc-sticky-create"
  />
</ng-template>
