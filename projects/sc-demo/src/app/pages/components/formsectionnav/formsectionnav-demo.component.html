<app-story-host [meta]="meta" [stories]="stories()" />

<!-- Stories declaradas como `<ng-template>`: el motor las pinta en su canvas. El
     Playground recibe `args` (knobs). `sections`/`activeId`/`sectionsWithErrors`
     son objetos → viven en el componente y se bindean directo. Los `data-testid`
     los miden los e2e de métrica del Kit (no quitar). -->

<ng-template #playground let-args>
  <div style="max-width: 260px">
    <sc-form-section-nav
      [sections]="sections"
      [activeId]="active()"
      [sectionsWithErrors]="errors"
      [flush]="args.flush"
      (activeChange)="onActive($event)"
    />
  </div>
</ng-template>

<ng-template #default>
  <div class="row" style="max-width: 260px">
    <sc-form-section-nav
      [sections]="sections"
      [activeId]="active()"
      [sectionsWithErrors]="errors"
      (activeChange)="onActive($event)"
      data-testid="sc-formnav-default"
    />
  </div>
</ng-template>

<ng-template #flush>
  <div class="row" style="max-width: 260px">
    <sc-form-section-nav
      [sections]="sections"
      [activeId]="active()"
      [flush]="true"
      [sectionsWithErrors]="errors"
      (activeChange)="onActive($event)"
      data-testid="sc-formnav-flush"
    />
  </div>
</ng-template>
