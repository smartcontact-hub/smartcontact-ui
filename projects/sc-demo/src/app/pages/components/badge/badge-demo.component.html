<app-story-host [meta]="meta" [stories]="stories()" />

<!-- Stories declaradas como `<ng-template>`: el motor las pinta en su canvas. El
     Playground recibe `args` (knobs); los ejemplos son estáticos. Los `data-testid`
     los miden los e2e de métrica del Kit (no quitar). -->

<ng-template #playground let-args>
  <sc-badge [label]="args.label" [variant]="args.variant" [size]="args.size" />
</ng-template>

<ng-template #variants>
  <sc-badge label="3" data-testid="sc-badge-md" />
  <sc-badge label="5" variant="secondary" />
  <sc-badge label="OK" variant="success" />
  <sc-badge label="i" variant="info" />
  <sc-badge label="!" variant="warning" />
  <sc-badge label="9+" variant="danger" />
  <sc-badge label="C" variant="contrast" />
</ng-template>

<ng-template #sizes>
  <sc-badge label="s" size="sm" data-testid="sc-badge-sm" />
  <sc-badge label="m" />
  <sc-badge label="l" size="lg" />
  <sc-badge label="xl" size="xl" data-testid="sc-badge-xl" />
</ng-template>
