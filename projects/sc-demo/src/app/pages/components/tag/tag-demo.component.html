<app-story-host [meta]="meta" [stories]="stories()" />

<!-- Stories declaradas como `<ng-template>`: el motor las pinta en su canvas. El
     Playground recibe `args` (knobs); los ejemplos son estáticos. Los `data-testid`
     los miden los e2e de métrica del Kit (no quitar). -->

<ng-template #playground let-args>
  <sc-tag
    [value]="args.value || null"
    [severity]="args.severity"
    [icon]="args.icon || null"
    [rounded]="args.rounded"
    [variant]="args.variant"
    [labelColor]="args.labelColor"
  />
</ng-template>

<ng-template #severities>
  <sc-tag value="Primary" data-testid="sc-tag" />
  <sc-tag value="Secondary" severity="secondary" />
  <sc-tag value="Success" severity="success" />
  <sc-tag value="Info" severity="info" />
  <sc-tag value="Warn" severity="warn" />
  <sc-tag value="Danger" severity="danger" />
  <sc-tag value="Contrast" severity="contrast" />
</ng-template>

<ng-template #variants>
  <sc-tag value="Rounded" [rounded]="true" />
  <sc-tag value="Con icono" icon="check" />
</ng-template>

<ng-template #label>
  <sc-tag variant="label" labelColor="gray" value="Gris" />
  <sc-tag variant="label" labelColor="red" value="Rojo" data-testid="sc-tag-label-red" />
  <sc-tag variant="label" labelColor="orange" value="Naranja" />
  <sc-tag variant="label" labelColor="amber" value="Ámbar" />
  <sc-tag variant="label" labelColor="green" value="Verde" />
  <sc-tag variant="label" labelColor="teal" value="Teal" />
  <sc-tag variant="label" labelColor="blue" value="Azul" />
  <sc-tag variant="label" labelColor="purple" value="Morado" />
</ng-template>
