<app-story-host [meta]="meta" [stories]="stories()" />

<!-- Stories como `<ng-template>`: el motor pinta canvas/knobs/código. El Playground
     abre el `sc-dialog` declarativo (two-way `[(visible)]`); la 2ª story dispara el
     dynamic dialog vía servicio. Los `data-testid` los miden los e2e (no quitar). -->

<ng-template #playground let-args>
  <sc-button label="Abrir diálogo" data-testid="open-dialog" (clicked)="open.set(true)" />

  <sc-dialog
    [(visible)]="open"
    [title]="args.title"
    [subtitle]="args.subtitle || null"
    [icon]="args.icon || null"
    [width]="args.width"
    [closable]="args.closable"
    [hasFooter]="args.hasFooter"
    [bodyless]="args.bodyless"
    [modal]="args.modal"
    [position]="args.position"
    [draggable]="args.draggable"
    [resizable]="args.resizable"
    [dismissableMask]="args.dismissableMask"
    data-testid="sc-dialog"
  >
    <p>El agente y sus datos asociados se eliminarán permanentemente.</p>
    <div modal-actions>
      <sc-button label="Cancelar" variant="secondary" appearance="outlined" data-testid="dialog-cancel" (clicked)="open.set(false)" />
      <sc-button label="Eliminar" variant="danger" (clicked)="open.set(false)" />
    </div>
  </sc-dialog>
</ng-template>

<ng-template #dynamic>
  <sc-button label="Abrir dinámico" data-testid="open-dynamic" (clicked)="openDynamic()" />
  <p>Resultado dinámico: <span data-testid="dyn-result">{{ dynResult() }}</span></p>
</ng-template>
