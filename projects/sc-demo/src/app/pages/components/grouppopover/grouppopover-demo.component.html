<app-story-host [meta]="meta" [stories]="stories()" />

<!-- Inline cell + hover popover (no hay trigger/estado): data-driven vía `[groups]`,
     sin inputs escalares. El Playground muestra una celda; la 2ª story contrasta
     pocos vs. muchos (+N más). Los `data-testid` los miden los e2e (no quitar). -->

<ng-template #playground let-args>
  <sc-group-popover [groups]="few" data-testid="sc-grouppopover-few" />
</ng-template>

<ng-template #overflow>
  <sc-group-popover [groups]="few" />
  <sc-group-popover [groups]="many" data-testid="sc-grouppopover-many" />
</ng-template>
