<app-story-host [meta]="meta" [stories]="stories()" />

<!-- Stories declaradas como `<ng-template>`: el motor las pinta en su canvas. El
     componente compone `sc-select` internamente (no hay proyección que declarar
     aquí). Los `data-testid` los miden los e2e de métrica del Kit (no quitar). -->

<ng-template #playground>
  <sc-bulk-edit-menu [fields]="fields" (commit)="onCommit($event)" />
</ng-template>

<ng-template #inline>
  <sc-bulk-edit-menu [fields]="fields" (commit)="onCommit($event)" data-testid="sc-bulkedit" />

  @if (lastCommit(); as c) {
    <p data-testid="sc-bulkedit-result">Commit: {{ c.fieldLabel }} → {{ c.valueLabel }}</p>
  }
</ng-template>
