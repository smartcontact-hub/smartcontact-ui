<app-story-host [meta]="meta" [stories]="stories()" />

<ng-template #playground let-args>
  <sc-photo-upload
    [name]="args.name"
    [size]="args.size"
    [illustrationPool]="args.illustrationPool"
    [ariaLabel]="args.ariaLabel || null"
    [photo]="pgPhoto()"
    (photoChange)="onPgPhotoChange($event)"
  />
</ng-template>

<ng-template #sizes>
  <div class="col">
    <div class="row">
      <sc-photo-upload
        name="Inés García"
        illustrationPool="abstract"
        [photo]="photo()"
        (photoChange)="onPhotoChange($event)"
        data-testid="sc-photoupload"
      />
      <sc-photo-upload name="Soporte" illustrationPool="abstract" size="sm" />
    </div>
    @if (photo()) {
      <p data-testid="photo-set">foto cargada</p>
    }
  </div>
</ng-template>
