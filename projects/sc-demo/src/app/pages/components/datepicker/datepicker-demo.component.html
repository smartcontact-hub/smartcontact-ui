<h1>sc-datepicker</h1>

<div class="col">
  <sc-datepicker label="Fecha de inicio" data-testid="sc-datepicker" />
  <sc-datepicker label="Obligatoria" [required]="true" />
  <sc-datepicker label="Con error" error="La fecha no es válida" data-testid="sc-datepicker-error" />
  <sc-datepicker label="Deshabilitada" [disabled]="true" />
</div>
