<app-story-host [meta]="meta" [stories]="stories()" />

<!-- Stories declaradas como `<ng-template>`: el motor las pinta en su canvas. El
     Playground recibe `args` (knobs); los ejemplos son estáticos. El wrapper
     `.demo-canvas` da fondo blanco: la sc-section-card es un panel gris pensado
     para verse SOBRE blanco (como en Figma). Los `data-testid` los miden los e2e
     de métrica del Kit (no quitar). -->

<ng-template #playground let-args>
  <div class="demo-canvas">
    <sc-section-card
      [titleKey]="args.titleKey"
      [hintKey]="args.hintKey || null"
      [icon]="args.icon || null"
      [collapsible]="args.collapsible"
      [initiallyCollapsed]="args.initiallyCollapsed"
      [flush]="args.flush"
    >
      <p class="demo-field">Contenido proyectado de la sección…</p>
    </sc-section-card>
  </div>
</ng-template>

<ng-template #nested>
  <div class="demo-canvas">
    <sc-section-card titleKey="Configuración del agente" icon="settings" data-testid="sc-section">
      <sc-subsection titleKey="Identidad" data-testid="sc-subsection">
        <sc-slot titleKey="Nombre" data-testid="sc-slot-1">
          <p class="demo-field">Campo de nombre del agente…</p>
        </sc-slot>
        <sc-slot titleKey="Extensión" data-testid="sc-slot-2">
          <p class="demo-field">Campo de extensión…</p>
        </sc-slot>
      </sc-subsection>
      <sc-subsection titleKey="Canales">
        <sc-slot titleKey="Voz">
          <p class="demo-field">Configuración de voz…</p>
        </sc-slot>
      </sc-subsection>
    </sc-section-card>
  </div>
</ng-template>

<ng-template #flat>
  <div class="demo-canvas">
    <sc-section-card
      titleKey="Sección plana"
      hintKey="contenido directo, sin subsecciones"
      icon="description"
      data-testid="sc-section-flat"
    >
      <p class="demo-field">Contenido proyectado directo — renderiza como el card plano.</p>
    </sc-section-card>
  </div>
</ng-template>

<ng-template #collapsible>
  <div class="demo-canvas">
    <sc-section-card
      titleKey="Ajustes avanzados"
      icon="tune"
      [collapsible]="true"
      [initiallyCollapsed]="true"
      data-testid="sc-section-collapsible"
    >
      <p class="demo-field">Contenido colapsable — clic en la cabecera para desplegar.</p>
    </sc-section-card>

    <sc-section-card
      titleKey="Sección flush (sin caja)"
      [flush]="true"
      data-testid="sc-section-flush"
    >
      <p class="demo-field">Sin fondo ni borde — el contenido va a sangre.</p>
    </sc-section-card>
  </div>
</ng-template>
