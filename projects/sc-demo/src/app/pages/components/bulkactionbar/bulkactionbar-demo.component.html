<app-story-host [meta]="meta" [stories]="stories()" />

<!-- Stories declaradas como `<ng-template>`: el motor las pinta en su canvas. El
     Playground recibe `args` (knobs) y las acciones proyectadas son estáticas. La
     barra es `position: fixed` al fondo: se ve al pie de la página. Los
     `data-testid` los miden los e2e de métrica del Kit (no quitar). -->

<ng-template #playground let-args>
  <sc-bulk-action-bar [count]="args.count" [entity]="entity" (clear)="count.set(0)">
    <button type="button">Editar</button>
    <button type="button">Eliminar</button>
  </sc-bulk-action-bar>
</ng-template>

<ng-template #selection>
  <button type="button" (click)="count.set(3)">Seleccionar 3</button>
  <button type="button" (click)="count.set(1)">Seleccionar 1</button>
  <button type="button" (click)="count.set(0)">Deseleccionar</button>

  <sc-bulk-action-bar [count]="count()" [entity]="entity" (clear)="count.set(0)" data-testid="sc-bulkbar">
    <button type="button">Editar</button>
    <button type="button">Eliminar</button>
  </sc-bulk-action-bar>
</ng-template>
