<app-story-host [meta]="meta" [stories]="stories()" />

<ng-template #playground let-args>
  <sc-datatable
    [value]="agents()"
    [columns]="playColumns"
    dataKey="id"
    [selectionMode]="args.selectionMode"
    [paginator]="args.paginator"
    [rows]="args.rows"
    [stripedRows]="args.stripedRows"
    [showGridlines]="args.showGridlines"
    [size]="args.size"
    [loading]="args.loading"
  />
</ng-template>

<ng-template #mvp>
  <sc-datatable
    [value]="agents()"
    [columns]="columns()"
    dataKey="id"
    selectionMode="multiple"
    [selection]="selection()"
    (selectionChange)="onSelectionChange($event)"
    [paginator]="true"
    [rows]="5"
    [rowsPerPageOptions]="[5, 10]"
    [stripedRows]="true"
    data-testid="sc-datatable"
  >
    <div scTableCaption class="dt-caption">Agentes ({{ agents().length }})</div>
    <div scTableEmpty class="dt-empty">No hay agentes</div>
  </sc-datatable>

  <p data-testid="dt-selected">Seleccionados: {{ selection().length }}</p>
  <button type="button" (click)="clear()" data-testid="dt-clear">Vaciar</button>
</ng-template>

<ng-template #lazy>
  <input
    type="text"
    class="dt-search"
    placeholder="Buscar por nombre…"
    (input)="lazyTable.filterGlobal($any($event.target).value, 'contains')"
    data-testid="dt-lazy-search"
  />
  <sc-datatable
    #lazyTable
    [value]="lazyRows()"
    [columns]="lazyColumns"
    dataKey="id"
    [lazy]="true"
    [totalRecords]="lazyTotal()"
    [globalFilterFields]="['name']"
    [paginator]="true"
    [rows]="5"
    (lazyLoad)="onLazyLoad($event)"
    data-testid="sc-datatable-lazy"
  />
  <p data-testid="dt-lazy-total">Total: {{ lazyTotal() }}</p>
</ng-template>

<!-- cellTemplate de la columna 'status': el consumidor compone la celda.
     Vive fuera de las stories para que `viewChild('statusTpl')` lo resuelva. -->
<ng-template #statusTpl let-agent>
  <span class="dt-status" [attr.data-active]="agent.status === 'active'">
    {{ agent.status === 'active' ? 'Activo' : 'Inactivo' }}
  </span>
</ng-template>
