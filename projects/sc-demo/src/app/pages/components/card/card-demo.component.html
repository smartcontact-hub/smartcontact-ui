<app-story-host [meta]="meta" [stories]="stories()" />

<!-- Stories declaradas como `<ng-template>`: el motor las pinta en su canvas. El
     Playground recibe `args` (knobs); los ejemplos son estáticos. Los `data-testid`
     los miden los e2e de métrica del Kit (no quitar). -->

<ng-template #playground let-args>
  <sc-card [header]="args.header || null" [subheader]="args.subheader || null">
    Contenido proyectado de la tarjeta. Hereda tipografía y tokens del tema.
  </sc-card>
</ng-template>

<ng-template #basic>
  <sc-card header="Título de card" subheader="Subtítulo" data-testid="sc-card">
    Contenido proyectado de la tarjeta. Hereda tipografía y tokens del tema.
  </sc-card>
  <sc-card>Sin cabecera — solo contenido.</sc-card>
</ng-template>
