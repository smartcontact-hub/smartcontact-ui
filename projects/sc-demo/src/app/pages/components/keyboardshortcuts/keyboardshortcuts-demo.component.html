<app-story-host [meta]="meta" [stories]="stories()" />

<!-- Service-driven: el host `<sc-keyboard-shortcuts>` se monta una vez y
     `ScKeyboardShortcutsService` posee la visibilidad. Sin inputs de host → el
     Playground es host + un disparador. Los `data-testid` los miden los e2e (no quitar). -->

<ng-template #playground let-args>
  <button
    type="button"
    class="demo-trigger"
    (click)="shortcuts.open()"
    data-testid="open-shortcuts"
  >
    Mostrar atajos (?)
  </button>

  <sc-keyboard-shortcuts />
</ng-template>
