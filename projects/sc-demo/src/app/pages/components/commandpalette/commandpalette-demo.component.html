<app-story-host [meta]="meta" [stories]="stories()" />

<!-- Service-driven: el host `<sc-command-palette>` se monta una vez y reacciona a
     `visible()`; el servicio posee la apertura. Sin inputs de host → el Playground
     es host + un disparador. Los `data-testid` los miden los e2e (no quitar). -->

<ng-template #playground let-args>
  <button type="button" class="demo-trigger" (click)="palette.open()" data-testid="open-palette">
    Abrir paleta (⌘K)
  </button>

  @if (lastRun(); as r) {
    <p data-testid="palette-last-run">Ejecutado: {{ r }}</p>
  }

  <sc-command-palette />
</ng-template>
