<app-story-host [meta]="meta" [stories]="stories()" />

<!-- Stories declaradas como `<ng-template>`: el motor las pinta en su canvas. El
     Playground recibe `args` (knobs); los ejemplos son estáticos. Los `data-testid`
     los miden los e2e de métrica del Kit (no quitar). -->

<ng-template #playground let-args>
  <sc-empty-state
    [icon]="args.icon"
    [titleKey]="args.titleKey"
    [bodyKey]="args.bodyKey"
    [ctaKey]="args.ctaKey || null"
  />
</ng-template>

<ng-template #plain>
  <sc-empty-state
    icon="inbox"
    titleKey="No hay agentes todavía"
    bodyKey="Crea tu primer agente para empezar a recibir llamadas."
    data-testid="sc-emptystate-plain"
  />
</ng-template>

<ng-template #cta>
  <sc-empty-state
    icon="group"
    titleKey="Sin grupos"
    bodyKey="Agrupa tus agentes para organizarlos por equipo o campaña."
    ctaKey="Crear grupo"
    data-testid="sc-emptystate-cta"
  />
</ng-template>
