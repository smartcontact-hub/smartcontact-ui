<app-story-host [meta]="meta" [stories]="stories()" />

<ng-template #playground let-args>
  <sc-inline-rename-cell
    [initialValue]="args.initialValue"
    [placeholder]="args.placeholder"
    [ariaLabel]="args.ariaLabel"
  />
</ng-template>

<ng-template #demo>
  <div class="col">
    <div class="cell" data-testid="rename-cell">
      @if (editing()) {
        <sc-inline-rename-cell
          [initialValue]="name()"
          placeholder="Nombre del equipo"
          [ariaLabel]="'Renombrar ' + name()"
          (commit)="onCommit($event)"
          (cancelled)="onCancel()"
          data-testid="sc-inline-rename"
        />
      } @else {
        <button type="button" class="cell__name" (click)="startEdit()" data-testid="start-edit">
          {{ name() }}
        </button>
      }
    </div>

    <p data-testid="rename-value">Valor: {{ name() }}</p>
  </div>
</ng-template>
