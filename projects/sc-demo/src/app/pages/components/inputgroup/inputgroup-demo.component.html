<h1>sc-inputgroup</h1>

<div class="col">
  <sc-inputgroup data-testid="sc-inputgroup">
    <p-inputgroup-addon>$</p-inputgroup-addon>
    <input pInputText placeholder="Precio" data-testid="ig-input" />

  <sc-inputgroup size="sm">
    <p-inputgroup-addon>@</p-inputgroup-addon>
    <input pInputText placeholder="Usuario (sm)" />
  </sc-inputgroup>
</div>
