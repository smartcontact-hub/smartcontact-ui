<app-story-host [meta]="meta" [stories]="stories()" />

<!-- Story como `<ng-template>`: el botón abre el diálogo (estado en el signal `open`).
     Los knobs mutan modo/título/etiquetas; items y badge vienen de signals del `.ts`.
     Los `data-testid` los miden los e2e (no quitar). -->

<ng-template #playground let-args>
  <button type="button" (click)="open.set(true)" data-testid="open-impact">
    Previsualizar impacto
  </button>

  <sc-impact-preview-dialog
    [visible]="open()"
    [mode]="args.mode"
    [title]="args.title"
    [items]="items()"
    [badge]="badge"
    [confirmLabel]="args.confirmLabel || null"
    [cancelLabel]="args.cancelLabel || null"
    (cancelled)="open.set(false)"
    (confirm)="onConfirm($event)"
    data-testid="sc-impact"
  />

  @if (result(); as r) {
    <p data-testid="impact-result">confirmado: {{ r.length }}</p>
  }
</ng-template>
