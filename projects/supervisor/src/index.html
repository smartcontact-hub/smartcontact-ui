<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>SmartContact AED</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="SmartContact — Supervisor module" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <!--
      Brand fonts. The Smart Contact design system pairs Inter (primary,
      everything except captions) with Open Sans (secondary, captions
      only). Without these `<link>` tags both `font-family` tokens fell
      back to system-ui, which silently drifted every screen away from
      the Figma. `preconnect` warms the TLS handshake before the font
      request fires; `display=swap` paints the page with the fallback
      first and swaps in the brand font once it loads (avoids invisible
      text during the font fetch).
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap"
    />
    <!--
      Material Symbols (Outlined) — icon set del SCDS (migración Lucide→Material,
      S60+). Variable font con ejes opsz/wght/FILL/GRAD; <sc-icon> los modula.
      `display=block` evita el flash del nombre-ligadura como texto mientras
      carga. Iconos de marca (GitHub…) NO existen aquí → se quedan en Lucide.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block"
    />
  </head>
  <body>
    <sc-root></sc-root>
  </body>
</html>
