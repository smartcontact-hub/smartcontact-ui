<aside class="sidebar" aria-label="Navegación principal">
  <a class="sidebar__brand" routerLink="/" [attr.aria-label]="'app.name' | translate">
    <img
      class="sidebar__brand-isotype"
      src="/logos/smartcontact-isotype-light.svg"
      width="40"
      height="40"
      alt=""
      aria-hidden="true"
    />
    <img
      class="sidebar__brand-wordmark"
      src="/logos/smartcontact-wordmark-light.svg"
      height="40"
      alt="SmartContact, a Digital Virgo tool"
    />
  </a>

  <nav class="sidebar__nav">
    @for (section of sections; track trackBySectionTitle($index, section)) {
      <div class="sidebar__section">
        <div class="sidebar__section-slot">
          <span class="sidebar__section-divider" aria-hidden="true"></span>
          <span class="sidebar__section-title">{{ section.titleKey | translate }}</span>
        </div>
        <div class="sidebar__section-items">
          @for (item of section.items; track trackByItemKey($index, item)) {
            <sc-sidebar-nav-item
              [item]="item"
              [currentPath]="currentPath()"
              (navigate)="onNavigate($event)"
            />
          }
        </div>
      </div>
    }
  </nav>

  <div class="sidebar__foot">
    <a
      class="sidebar__decisions"
      [href]="decisionsHref"
      target="_blank"
      rel="noopener noreferrer"
      [title]="'sidebar.design_decisions_hint' | translate"
      (click)="onOpenDesignDecisions($event)"
    >
      <!-- Marca GitHub: sin glifo Material → SVG inline (octicon mark). -->
      <svg
        class="sidebar__decisions-icon"
        width="15"
        height="15"
        viewBox="0 0 24 24"
        fill="currentColor"
        aria-hidden="true"
        focusable="false"
      >
        <path
          d="M12 .5C5.37.5 0 5.78 0 12.292c0 5.211 3.438 9.63 8.205 11.188.6.111.82-.254.82-.567 0-.28-.01-1.022-.015-2.005-3.338.711-4.042-1.582-4.042-1.582-.546-1.361-1.335-1.725-1.335-1.725-1.087-.731.084-.716.084-.716 1.205.082 1.838 1.215 1.838 1.215 1.07 1.803 2.809 1.282 3.495.981.108-.763.417-1.282.76-1.577-2.665-.295-5.466-1.309-5.466-5.827 0-1.287.465-2.339 1.235-3.164-.135-.298-.54-1.497.105-3.121 0 0 1.005-.316 3.3 1.209.96-.262 1.98-.392 3-.398 1.02.006 2.04.136 3 .398 2.28-1.525 3.285-1.209 3.285-1.209.645 1.624.24 2.823.12 3.121.765.825 1.23 1.877 1.23 3.164 0 4.53-2.805 5.527-5.475 5.817.42.354.81 1.077.81 2.182 0 1.578-.015 2.846-.015 3.229 0 .315.21.689.825.573C20.565 21.917 24 17.495 24 12.292 24 5.78 18.63.5 12 .5z"
        />
      </svg>
      <span class="sidebar__decisions-label">{{ 'sidebar.design_decisions' | translate }}</span>
      <sc-icon class="sidebar__decisions-external" [name]="externalIcon" size="inherit" />
    </a>
  </div>
</aside>
