<div class="page">
  <div class="page__inner page__inner--reading">
    <!-- El título de la página vive en el CUERPO, no en la barra: la miga de
         arriba dice DÓNDE estás y esta línea dice QUÉ miras (modelo Snow UI,
         medido en `/orders`). Es el MISMO `<h1>` que S59 dejó oculto —no hay un
         encabezado nuevo—, así que sigue habiendo exactamente uno por documento. -->
    <h1 class="page__heading">{{ 'config.seguridad.title' | translate }}</h1>

    <div class="empty">
      <span class="empty__icon" aria-hidden="true">
        <sc-icon [name]="shieldIcon" [size]="20" />
      </span>
      <p class="empty__title">{{ 'config.seguridad.empty.title' | translate }}</p>
      <p class="empty__body">{{ 'config.seguridad.empty.body' | translate }}</p>
    </div>
  </div>
</div>
