<div class="page">
  <!-- El modelo "todo arriba" (S59) dejó estas páginas sin <h1>: la
       identidad la daba solo un <ol> de breadcrumb, y el documento quedaba
       sin encabezado. Visualmente oculto porque el diseño no lo pide. -->
  <h1 class="visually-hidden">{{ 'config.seguridad.title' | translate }}</h1>

  <div class="page__inner">
    <div class="empty">
      <span class="empty__icon" aria-hidden="true">
        <sc-icon [name]="shieldIcon" [size]="20" />
      </span>
      <p class="empty__title">{{ 'config.seguridad.empty.title' | translate }}</p>
      <p class="empty__body">{{ 'config.seguridad.empty.body' | translate }}</p>
    </div>
  </div>
</div>
