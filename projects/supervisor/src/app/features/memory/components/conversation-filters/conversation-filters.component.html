<div class="memory-conversation-filters">
  <div class="memory-conversation-filters__grid">
    <sc-multiselect
      size="sm"
      [label]="'memory.conversations.filters.services_label' | translate"
      [options]="serviceOptions"
      optionLabel="label"
      optionValue="value"
      [placeholder]="'memory.conversations.filters.services_placeholder' | translate"
      [filter]="true"
      [value]="[...filters().services]"
      (valueChange)="setServices($event)"
    />

    <sc-datepicker
      size="sm"
      [label]="'memory.conversations.filters.date_label' | translate"
      [placeholder]="'memory.conversations.filters.date_placeholder' | translate"
      [value]="filters().date"
      (valueChange)="setDate($event)"
      [showClear]="true"
    />

    <sc-inputtext
      size="sm"
      [label]="'memory.conversations.filters.origin_label' | translate"
      [placeholder]="'memory.conversations.filters.origin_placeholder' | translate"
      [value]="filters().origin"
      (valueChange)="setOrigin($event)"
    />

    <sc-inputtext
      size="sm"
      [label]="'memory.conversations.filters.destination_label' | translate"
      [placeholder]="'memory.conversations.filters.destination_placeholder' | translate"
      [value]="filters().destination"
      (valueChange)="setDestination($event)"
    />

    <sc-multiselect
      size="sm"
      [label]="'memory.conversations.filters.groups_label' | translate"
      [options]="groupOptions"
      optionLabel="label"
      optionValue="value"
      [placeholder]="'memory.conversations.filters.groups_placeholder' | translate"
      [filter]="true"
      [value]="[...filters().groups]"
      (valueChange)="setGroups($event)"
    />

    <sc-multiselect
      size="sm"
      [label]="'memory.conversations.filters.agents_label' | translate"
      [options]="agentOptions"
      optionLabel="label"
      optionValue="value"
      [placeholder]="'memory.conversations.filters.agents_placeholder' | translate"
      [filter]="true"
      [value]="[...filters().agents]"
      (valueChange)="setAgents($event)"
    />
  </div>

  <div class="memory-conversation-filters__actions">
    <div class="memory-conversation-filters__actions-left">
      <sc-memory-type-filter-button [(filters)]="filters" />
      <sc-memory-category-filter-button
        [available]="availableAiCategories()"
        [selected]="filters().aiCategories"
        (selectedChange)="onAiCategoriesChange($event)"
      />
      @if (failedCount() > 0) {
        <button
          type="button"
          class="memory-failed-chip"
          [class.is-active]="filters().status.onlyFailed"
          (click)="toggleOnlyFailed()"
          [attr.aria-pressed]="filters().status.onlyFailed"
          [attr.title]="'memory.conversations.filters.only_failed_hint' | translate"
        >
          <sc-icon [name]="alertIcon" size="inherit" />
          <span>{{ 'memory.conversations.filters.only_failed' | translate }}</span>
          <span class="memory-failed-chip__count">{{ failedCount() }}</span>
        </button>
      }

      <!-- Aquí vivían Transcribir / Descargar / Marcar leídas, los tres
           DESHABILITADOS mientras no hubiese selección: tres controles grises
           que no explicaban por qué (antipatrón nº1 de Nielsen) y que además
           partían la selección en dos sitios — la casilla en la fila, sus
           consecuencias arriba del todo.
           R5: la selección se manifiesta en UN solo sitio. Las tres se han ido
           a la `<sc-bulk-action-bar>` de la página, que aparece cuando hay algo
           seleccionado y desaparece cuando no. Ver la Ola 5 del plan. -->
    </div>

    <div class="memory-conversation-filters__actions-right">
      <span
        class="memory-conversation-filters__results"
        role="status"
        aria-live="polite"
        aria-atomic="true"
      >
        {{ 'memory.conversations.filters.results' | translate }}:
        <span class="memory-conversation-filters__results-num">{{ filteredCount() }}</span>
        @if (lastSearchAt()) {
          <span class="memory-conversation-filters__results-sep">·</span>
          {{ 'memory.conversations.filters.last_search' | translate }}:
          <span class="memory-conversation-filters__results-time">{{ lastSearchLabel() }}</span>
        }
      </span>
      <button
        type="button"
        class="sc-icon-btn"
        (click)="onReset()"
        [attr.aria-label]="'memory.conversations.filters.reset' | translate"
        [attr.title]="'memory.conversations.filters.reset' | translate"
      >
        <sc-icon [name]="resetIcon" size="inherit" />
      </button>
    </div>
  </div>
</div>
