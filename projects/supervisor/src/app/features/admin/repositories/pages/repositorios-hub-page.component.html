<!-- Esta página fue la ÚLTIMA que llevó `<sc-page-header>`, y lo que sobraba
     de aquella BANDA no era el título: era la banda —icono, borde, sombra y
     `position: sticky`— compitiendo con la rejilla de destinos. S59 se la
     llevó entera y de paso escondió el `<h1>`; lo que vuelve ahora es solo la
     línea de título, sin chrome. Mismo patrón que las nueve listas. -->
<div class="hub">
  <div class="hub__inner page__inner page__inner--hub">
    <!-- El título de la página vive en el CUERPO, no en la barra: la miga de
         arriba dice DÓNDE estás y esta línea dice QUÉ miras (modelo Snow UI,
         medido en `/orders`). Es el MISMO `<h1>` que S59 dejó oculto —no hay un
         encabezado nuevo—, así que sigue habiendo exactamente uno por documento. -->
    <h1 class="page__heading">{{ 'sidebar.repositories' | translate }}</h1>

    <div class="hub__categories">
      @for (category of categories; track category.titleKey) {
        <section class="hub__category">
          <h2 class="hub__category-title">{{ category.titleKey | translate }}</h2>
          <div class="hub__group">
            @for (item of category.items; track item.labelKey) {
              <button
                type="button"
                class="hub-item"
                [class.hub-item--disabled]="!item.ready"
                [disabled]="!item.ready"
                (click)="onItemClick(item)"
              >
                <span class="hub-item__icon" aria-hidden="true">
                  <sc-icon [name]="item.icon" [size]="20" />
                </span>
                <span class="hub-item__text">
                  <span class="hub-item__label">{{ item.labelKey | translate }}</span>
                  <span class="hub-item__description">{{ item.descriptionKey | translate }}</span>
                </span>
                @if (item.ready) {
                  <sc-icon class="hub-item__chevron" [name]="chevronIcon" size="inherit" />
                } @else {
                  <span class="hub-item__soon">
                    {{ 'repositories.hub.coming_soon' | translate }}
                  </span>
                }
              </button>
            }
          </div>
        </section>
      }
    </div>
  </div>
</div>
