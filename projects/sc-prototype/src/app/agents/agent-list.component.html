<sc-page-header
  titleKey="Agentes"
  subtitleKey="Gestiona los agentes de tu equipo"
  icon="group"
></sc-page-header>

<sc-datatable
  [value]="filtered()"
  [columns]="columns()"
  dataKey="id"
  selectionMode="multiple"
  [selection]="selection()"
  (selectionChange)="onSelectionChange($event)"
  [paginator]="true"
  [rows]="5"
  [rowsPerPageOptions]="[5, 10]"
  [stripedRows]="true"
>
  <div scTableCaption class="agents-toolbar">
    <sc-search [(value)]="query" placeholder="Buscar agente…"></sc-search>
  </div>
  <sc-empty-state
    scTableEmpty
    icon="group"
    titleKey="Sin agentes"
    bodyKey="No hay agentes que coincidan con tu búsqueda."
  ></sc-empty-state>
</sc-datatable>

<sc-bulk-action-bar
  [count]="selection().length"
  [entity]="entity"
  (clear)="clearSelection()"
></sc-bulk-action-bar>

<!-- Celda de nombre: editable in-place con sc-inline-rename-cell. -->
<ng-template #nameTpl let-agent>
  @if (renamingId() === agent.id) {
    <sc-inline-rename-cell
      [initialValue]="agent.name"
      (commit)="commitRename(agent, $event)"
      (cancelled)="cancelRename()"
    ></sc-inline-rename-cell>
  } @else {
    <span class="agent-name">
      <span class="agent-name__text">{{ agent.name }}</span>
      <button
        type="button"
        class="agent-name__rename"
        (click)="startRename(agent)"
        aria-label="Renombrar agente"
      >
        <sc-icon name="edit"></sc-icon>
      </button>
    </span>
  }
</ng-template>

<!-- Celda de estado: tag categórico (variante label, 8 colores del DS). -->
<ng-template #statusTpl let-agent>
  <sc-tag
    variant="label"
    [labelColor]="agent.status === 'active' ? 'green' : 'gray'"
    [value]="agent.status === 'active' ? 'Activo' : 'Inactivo'"
  ></sc-tag>
</ng-template>
