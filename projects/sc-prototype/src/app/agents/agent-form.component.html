<sc-page-header
  entityKey="Agente"
  titleKey="Editar agente"
  subtitleKey="Inés García · ext. 101"
  icon="badge"
></sc-page-header>

<div class="agent-form">
  <sc-section-card titleKey="Configuración del agente" icon="settings">
    <sc-subsection titleKey="Identidad">
      <sc-slot titleKey="Nombre">
        <sc-inputtext [(value)]="name" [fluid]="true" placeholder="Nombre del agente"></sc-inputtext>
      </sc-slot>
      <sc-slot titleKey="Extensión">
        <sc-inputtext [(value)]="extension" [fluid]="true" inputmode="numeric" placeholder="101"></sc-inputtext>
      </sc-slot>
      <sc-slot titleKey="Email">
        <sc-inputtext [(value)]="email" type="email" [fluid]="true"></sc-inputtext>
      </sc-slot>
    </sc-subsection>

    <sc-subsection titleKey="Disponibilidad">
      <sc-slot titleKey="Activo" hintKey="Recibe llamadas entrantes">
        <sc-toggleswitch
          [checked]="active()"
          (checkedChange)="active.set($event)"
          ariaLabel="Activo"
        ></sc-toggleswitch>
      </sc-slot>
      <sc-slot titleKey="Grabar llamadas" hintKey="Guarda el audio para control de calidad">
        <sc-toggleswitch
          [checked]="recordCalls()"
          (checkedChange)="recordCalls.set($event)"
          ariaLabel="Grabar llamadas"
        ></sc-toggleswitch>
      </sc-slot>
    </sc-subsection>
  </sc-section-card>

  <sc-section-card
    titleKey="Ajustes avanzados"
    icon="tune"
    [collapsible]="true"
    [initiallyCollapsed]="true"
  >
    <p class="agent-form__hint">Enrutado, horarios y overrides — colapsado por defecto.</p>
  </sc-section-card>

  <footer class="agent-form__footer">
    <button type="button" class="btn btn--ghost">Cancelar</button>
    <button type="button" class="btn btn--primary">Guardar</button>
  </footer>
</div>
