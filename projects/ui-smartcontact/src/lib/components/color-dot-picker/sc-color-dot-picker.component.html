<div class="picker" role="radiogroup" [attr.aria-label]="ariaLabel()">
  @for (option of options(); track option.value) {
    <button
      type="button"
      role="radio"
      [attr.aria-checked]="option.value === value()"
      [attr.aria-label]="option.label"
      [title]="option.label"
      class="picker__swatch"
      [class.picker__swatch--selected]="option.value === value()"
      (click)="select(option)"
    >
      <span class="picker__dot" [style.background]="option.color"></span>
    </button>
  }
</div>
