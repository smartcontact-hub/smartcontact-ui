@if (label()) {
  <sc-field-label
    block="sc-inputnumber"
    [text]="label()!"
    [required]="required()"
    [for]="resolvedId()"
  />
}

<div class="sc-inputnumber__field" [class.sc-inputnumber__field--has-suffix]="hasSuffix()">
  <input
    pInputText
    class="sc-inputnumber__control"
    type="number"
    inputmode="numeric"
    [id]="resolvedId()"
    [placeholder]="placeholder() ?? ''"
    [disabled]="disabled()"
    [readonly]="readonly()"
    [attr.name]="name() ?? null"
    [attr.min]="min() ?? null"
    [attr.max]="max() ?? null"
    [attr.step]="step()"
    [attr.aria-invalid]="isInvalid() ? true : null"
    [attr.aria-describedby]="footerText() ? resolvedId() + '-msg' : null"
    [attr.aria-required]="required() ? true : null"
    [value]="displayValue()"
    (input)="onInput($event)"
    (blur)="onBlur()"
  />

  @if (hasSuffix()) {
    <span class="sc-inputnumber__suffix" aria-hidden="true">{{ suffix() }}</span>
  }
</div>

@if (footerText()) {
  <sc-field-msg
    block="sc-inputnumber"
    [text]="footerText()"
    [isError]="!!error()"
    [msgId]="resolvedId() + '-msg'"
  />
}
