@if (label() && !inline()) {
  <sc-field-label
    block="sc-datepicker"
    [text]="label()!"
    [required]="required()"
    [for]="resolvedId()"
  />
}

<p-datepicker
  class="sc-datepicker__control"
  [inputId]="resolvedId()"
  [placeholder]="placeholder()"
  [disabled]="disabled()"
  [dateFormat]="dateFormat()"
  [view]="view()"
  [minDate]="minDate() ?? null"
  [maxDate]="maxDate() ?? null"
  [inline]="inline()"
  [showClear]="showClear()"
  [showIcon]="!inline() && showIcon()"
  [iconDisplay]="'input'"
  [showButtonBar]="showButtonBar()"
  [size]="pSize()"
  [panelStyleClass]="panelStyleClass()"
  [appendTo]="'body'"
  [ngModel]="value()"
  (ngModelChange)="onModelChange($event)"
  (onBlur)="onBlur()"
  [attr.name]="name() ?? null"
  [attr.aria-describedby]="footerText() ? resolvedId() + '-msg' : null"
  [attr.aria-required]="required() ? true : null"
  [attr.aria-invalid]="isInvalid() ? true : null"
/>

@if (footerText()) {
  <sc-field-msg
    block="sc-datepicker"
    [text]="footerText()"
    [isError]="!!error()"
    [msgId]="resolvedId() + '-msg'"
  />
}
