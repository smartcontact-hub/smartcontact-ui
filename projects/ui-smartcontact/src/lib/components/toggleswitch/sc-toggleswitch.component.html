<p-toggleswitch
  [ngModel]="checked()"
  (ngModelChange)="onChange($event)"
  (onChange)="changed.emit($event)"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [size]="pSize()"
  [inputId]="effectiveInputId()"
  [ariaLabel]="ariaLabel() ?? undefined"
  [ariaLabelledBy]="ariaLabelledBy() ?? undefined"
/>
